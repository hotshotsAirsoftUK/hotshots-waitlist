<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Hotshots Airsoft</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='2' fill='%233D4A2E'/><text x='16' y='22' font-family='Arial' font-size='13' font-weight='bold' fill='%23C8860A' text-anchor='middle'>HA</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600;700&family=Barlow+Semi+Condensed:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    :root {
      --olive: #3D4A2E; --amber: #C8860A; --smoke: #F5F3EE;
      --ash: #9A9A8A; --black: #0D0F0A; --card: #1B1F17;
      --border: #2D3325; --muted: #9A9A8A;
    }
    body { background: var(--black); color: var(--smoke); font-family: 'Barlow', Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 24px; }
    .error-code { font-family: 'Bebas Neue', Arial, sans-serif; font-size: clamp(80px, 20vw, 140px); line-height: 1; color: var(--olive); letter-spacing: 8px; margin-bottom: 8px; }
    .error-title { font-family: 'Bebas Neue', Arial, sans-serif; font-size: clamp(24px, 5vw, 36px); letter-spacing: 4px; text-transform: uppercase; color: var(--smoke); margin-bottom: 16px; }
    .error-text { font-size: 15px; color: var(--ash); max-width: 380px; line-height: 1.7; margin-bottom: 36px; }
    .btn { display: inline-block; background: var(--amber); color: var(--black); font-family: 'Barlow Semi Condensed', Arial, sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 14px 32px; text-decoration: none; border-radius: 2px; border: 2px solid var(--amber); transition: all 0.3s; }
    .btn:hover { background: transparent; color: var(--amber); }
  
    /* ── FOCUS OUTLINE (§16.3.4) ── */
    *:focus-visible {
      outline: 2px solid var(--olive);
      outline-offset: 2px;
    }
    *:focus:not(:focus-visible) {
      outline: none;
    }
    </style>
</head>
<body>
  <div class="error-code">404</div>
  <div class="error-title">Target Missed</div>
  <p class="error-text">That page doesn't exist. It may have moved or the URL might be wrong.</p>
  <a href="index.html" class="btn">Back to Home</a>
</body>
</html>
